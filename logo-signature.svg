<svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Handwritten signature style "Patrick Kirkland" -->
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Large P with oval loop -->
    <path d="M25 85 C20 80, 18 70, 22 55 C26 40, 35 20, 50 15 C70 8, 85 15, 80 30 C75 45, 55 50, 35 52 C30 53, 25 58, 23 70 C21 82, 24 88, 25 85" />
    <!-- P inner loop -->
    <ellipse cx="55" cy="28" rx="18" ry="12" transform="rotate(-15 55 28)" />

    <!-- "atrick" lowercase flowing -->
    <path d="M58 55 C55 50, 58 42, 65 45 C62 50, 60 58, 65 58 C72 58, 78 48, 82 45 C80 52, 78 60, 82 58 C88 55, 95 45, 98 42 C96 50, 94 58, 98 56 C104 52, 112 42, 115 40 C112 48, 110 58, 115 55 C122 50, 130 40, 135 38" />

